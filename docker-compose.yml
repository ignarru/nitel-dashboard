services:
  dashboard:
    build: .
    container_name: nitel-dashboard
    restart: unless-stopped
    ports:
      # 0.0.0.0 para que el reverse proxy (Nginx Proxy Manager, en otra red/host)
      # pueda alcanzar el contenedor. El acceso queda igualmente protegido por el
      # login con Google; el proxy expone el dominio por HTTPS.
      - "0.0.0.0:3000:3000"
    env_file:
      - .env.local
    volumes:
      # Escribible (NO :ro): el login de Gmail (/api/auth/google/init) guarda
      # acá secrets/oauth-token.json. Al ser un bind-mount a una carpeta del
      # host, el token sobrevive rebuilds y reinicios del contenedor.
      - ./secrets:/app/secrets
    extra_hosts:
      - "host.docker.internal:host-gateway"
